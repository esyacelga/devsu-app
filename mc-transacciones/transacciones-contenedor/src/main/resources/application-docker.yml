server:
  port: 8182
  error:
    whitelabel:
      enabled: false

logging:
  level:
    ec.devsu.app: DEBUG

spring:
  mvc:
    view:
      prefix:
      suffix:
  web:
    resources:
      add-mappings: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://postgres-devsu:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver


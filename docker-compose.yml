version: "3.9"
services:
  postgres-db:
    image: postgres:15
    container_name: postgres-devsu
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - red-devsu-app
    restart: always



volumes:
  postgres-data:

networks:
  red-devsu-app:
    driver: bridge

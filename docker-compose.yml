version: "3.9"
services:
  postgres-db:
    image: postgres:15
    container_name: postgres-devsu
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: seya1922
      POSTGRES_DB: devsu
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres-data:
